unbind C-b
bind-key k clear-history

set -g prefix C-s
set -g status off 
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -ga terminal-features ",alacritty:usstyle"

set-environment -g "LC_ALL" "en_CA.UTF-8"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-save 'S'
set -g @resurrect-restore 'r'
set -g @resurrect-default-processes 'nvim htop nvtop ranger mutt watch python tclock weechat'

#set -g @resurrect-processes 'nvim htop nvtop ranger mutt watch python tclock'
set -g @resurrect-processes ':all:'

run '~/.local/share/tmux/plugins/tpm/tpm'
